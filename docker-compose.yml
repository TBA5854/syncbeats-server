
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - syncnet

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
      - sqlite:/app/data
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - DB_PATH=/app/data/syncbeats.db
    networks:
      - syncnet

volumes:
  uploads:
  sqlite:

networks:
  syncnet:
    driver: bridge
